<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body {
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f7fa;
            font-family: Arial;
        }

        .box {
            background:white;
            padding:30px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        input {
            display:block;
            margin:10px auto;
            padding:10px;
            width:220px;
        }

        button {
            padding:10px 20px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>

    <form method="POST" action="{% url 'reset_password' %}">
        {% csrf_token %}

        <!-- IMPORTANT hidden username -->
        <input type="hidden" name="username" value="{{ username }}">

        <input type="password" name="password" placeholder="New Password" required>

        <button type="submit">Update Password</button>
    </form>
</div>

</body>
</html>
