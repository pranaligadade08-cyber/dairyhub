<!DOCTYPE html>
<html>
<head>
    <title>Farmer Login</title>

    <style>
        body {
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1abc9c, #16a085);
        }

        .box {
            background:white;
            padding:30px;
            border-radius:12px;
            width:300px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom:15px;
        }

        input {
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button {
            width:100%;
            padding:10px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
        }

        button:hover {
            background:#2ecc71;
        }

        .error {
            color:red;
            margin-top:10px;
        }

        .forgot {
            margin-top:10px;
        }

        .forgot a {
            text-decoration:none;
            color:#2980b9;
            font-size:14px;
        }

        .forgot a:hover {
            text-decoration:underline;
        }

        .back {
            margin-top:10px;
        }

        .back a {
            text-decoration:none;
            font-size:14px;
            color:#555;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Farmer Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <!-- ✅ Forgot Password -->
    <div class="forgot">
        <a href="/forgot-password/">Forgot Password?</a>
    </div>

    <!-- 🔙 Back to main login -->
    <div class="back">
        <a href="/">← Back to Main Login</a>
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
