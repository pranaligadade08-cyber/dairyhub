<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <style>
        body {
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#eef2f7;
            font-family: Arial, sans-serif;
        }

        .box {
            background:white;
            padding:30px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
            width:300px;
        }

        h2 {
            margin-bottom:20px;
        }

        input {
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button {
            width:100%;
            padding:10px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover {
            background:#2ecc71;
        }

        .error {
            color:red;
            margin-top:10px;
        }

        .info {
            font-size:13px;
            color:#555;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Verify OTP</h2>

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <!-- IMPORTANT: send username -->
        <!--<input type="hidden" name="username" value="{{ username }}"> -->

        <input type="text" name="otp" placeholder="Enter OTP" required>

        <button type="submit">Verify</button>
    </form>

    <!-- ERROR MESSAGE -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <!-- OPTIONAL (for testing only) -->
    {% if otp %}
        <p class="info">Your OTP: {{ otp }}</p>
    {% endif %}

</div>

</body>
</html>
